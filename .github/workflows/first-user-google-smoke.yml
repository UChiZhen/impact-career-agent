name: first-user-google-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: first-user-google-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gmail-readonly-smoke:
    if: github.ref == 'refs/heads/main'
    environment:
      name: first-user-google-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out the public repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Gmail runtime dependencies
        run: python -m pip install -e ".[gmail]"

      - name: Confirm unrelated private settings are unavailable
        run: |
          forbidden_names=(
            GEMINI_API_KEY
            OPENAI_API_KEY
            APIFY_API_TOKEN
            GOOGLE_SHEET_ID
            GOOGLE_APPLICATION_TRACKER_SHEET_ID
            GMAIL_RECIPIENT
            PRIVATE_CANDIDATE_PROFILE_YAML
            PRIVATE_MASTER_RESUME_YAML
            PRIVATE_LINKEDIN_SEARCHES_YAML
          )

          for name in "${forbidden_names[@]}"; do
            if [[ -n "${!name-}" ]]; then
              echo "::error::Unrelated private setting $name must not be available."
              exit 1
            fi
          done

          test ! -e private

      - name: Read at most one LinkedIn alert through Gmail
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          auth_dir="${RUNNER_TEMP}/google-auth"
          credentials_path="${auth_dir}/credentials.json"
          token_path="${auth_dir}/token.json"
          output_file="${RUNNER_TEMP}/google-smoke.txt"
          error_file="${RUNNER_TEMP}/google-smoke-error.txt"
          trap 'rm -rf "${auth_dir}"' EXIT

          if [[ -z "${GOOGLE_CREDENTIALS_JSON:-}" || -z "${GOOGLE_TOKEN_JSON:-}" ]]; then
            echo "::error::Google OAuth JSON Secrets are not configured."
            exit 1
          fi

          umask 077
          mkdir -p "${auth_dir}"
          printf '%s' "${GOOGLE_CREDENTIALS_JSON}" >"${credentials_path}"
          printf '%s' "${GOOGLE_TOKEN_JSON}" >"${token_path}"
          unset GOOGLE_CREDENTIALS_JSON GOOGLE_TOKEN_JSON

          python -c 'import json, sys; credentials = json.load(open(sys.argv[1])); token = json.load(open(sys.argv[2])); client = credentials.get("installed") or credentials.get("web") or {}; assert client.get("client_id") == token.get("client_id"); assert token.get("refresh_token"); assert "https://www.googleapis.com/auth/gmail.readonly" in token.get("scopes", [])' "${credentials_path}" "${token_path}"

          if ! career-agent scan-linkedin-email \
            --live \
            --credentials-path "${credentials_path}" \
            --token-path "${token_path}" \
            --hours-back 26 \
            --max-results 1 >"${output_file}" 2>"${error_file}"; then
            echo "::error::Google read-only smoke failed; raw provider output was withheld."
            exit 1
          fi

          cat "${output_file}"

          query=$(awk -F': ' '$1 == "Query" {print $2}' "${output_file}")
          messages=$(awk -F': ' '$1 == "Messages" {print $2}' "${output_file}")
          opportunities=$(awk -F': ' '$1 == "Opportunities" {print $2}' "${output_file}")

          [[ "${query}" == from:jobalerts-noreply@linkedin.com\ after:* ]]
          [[ "${messages}" =~ ^[0-9]+$ && "${messages}" -le 1 ]]
          [[ "${opportunities}" =~ ^[0-9]+$ ]]
          if grep -Fq "Top opportunities" "${output_file}"; then
            echo "::error::Google smoke exposed opportunity details."
            exit 1
          fi
          grep -Fq "Details hidden." "${output_file}" || [[ "${opportunities}" == "0" ]]

      - name: Confirm Google smoke left no credentials or generated files
        run: |
          test ! -e "${RUNNER_TEMP}/google-auth"
          test ! -e private
          test ! -e application_packets
          test -z "$(git status --porcelain --untracked-files=all)"
