name: first-user-integrated-dry-run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: first-user-integrated-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integrated-read-and-preview:
    if: github.ref == 'refs/heads/main'
    environment:
      name: first-user-integrated-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out the public repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install integrated read and preview dependencies
        run: python -m pip install -e ".[gemini,gmail,apify,career-pages]"

      - name: Confirm write-only and unrelated settings are unavailable
        run: |
          forbidden_names=(
            OPENAI_API_KEY
            GMAIL_RECIPIENT
            GOOGLE_APPLICATION_TRACKER_SHEET_ID
            GOOGLE_APPLICATION_TRACKER_SHEET_NAME
            DRIVE_ROOT_FOLDER
          )

          for name in "${forbidden_names[@]}"; do
            if [[ -n "${!name-}" ]]; then
              echo "::error::Write-only or unrelated setting $name must not be available."
              exit 1
            fi
          done

          test ! -e private
          test ! -e application_packets

      - name: Run the integrated private dry-run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PRIVATE_CANDIDATE_PROFILE_YAML: ${{ secrets.PRIVATE_CANDIDATE_PROFILE_YAML }}
          PRIVATE_MASTER_RESUME_YAML: ${{ secrets.PRIVATE_MASTER_RESUME_YAML }}
          PRIVATE_LINKEDIN_SEARCHES_YAML: ${{ secrets.PRIVATE_LINKEDIN_SEARCHES_YAML }}
          GEMINI_MODEL: gemini-3.1-flash-lite
          APIFY_MAX_TOTAL_JOBS: "1"
          APIFY_INTER_QUERY_DELAY_SECONDS: "0"
        run: |
          run_dir="${RUNNER_TEMP}/integrated-dry-run"
          auth_dir="${run_dir}/google-auth"
          private_dir="${run_dir}/private"
          credentials_path="${auth_dir}/credentials.json"
          token_path="${auth_dir}/token.json"
          candidate_path="${private_dir}/candidate_profile.yaml"
          resume_path="${private_dir}/master_resume.yaml"
          searches_path="${private_dir}/linkedin_searches.yaml"
          output_file="${run_dir}/summary.txt"
          error_file="${run_dir}/provider-error.txt"
          trap 'rm -rf "${run_dir}"' EXIT

          required_names=(
            GEMINI_API_KEY
            APIFY_API_TOKEN
            GOOGLE_CREDENTIALS_JSON
            GOOGLE_TOKEN_JSON
            GOOGLE_SHEET_ID
            PRIVATE_CANDIDATE_PROFILE_YAML
            PRIVATE_MASTER_RESUME_YAML
            PRIVATE_LINKEDIN_SEARCHES_YAML
          )
          for name in "${required_names[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required integrated dry-run Secret $name is not configured."
              exit 1
            fi
          done

          umask 077
          mkdir -p "${auth_dir}" "${private_dir}"
          printf '%s' "${GOOGLE_CREDENTIALS_JSON}" >"${credentials_path}"
          printf '%s' "${GOOGLE_TOKEN_JSON}" >"${token_path}"
          printf '%s' "${PRIVATE_CANDIDATE_PROFILE_YAML}" >"${candidate_path}"
          printf '%s' "${PRIVATE_MASTER_RESUME_YAML}" >"${resume_path}"
          printf '%s' "${PRIVATE_LINKEDIN_SEARCHES_YAML}" >"${searches_path}"
          unset GOOGLE_CREDENTIALS_JSON GOOGLE_TOKEN_JSON
          unset PRIVATE_CANDIDATE_PROFILE_YAML PRIVATE_MASTER_RESUME_YAML
          unset PRIVATE_LINKEDIN_SEARCHES_YAML

          python -c 'import json, sys; credentials = json.load(open(sys.argv[1])); token = json.load(open(sys.argv[2])); client = credentials.get("installed") or credentials.get("web") or {}; scopes = set(token.get("scopes", [])); assert client.get("client_id") == token.get("client_id"); assert token.get("refresh_token"); assert "https://www.googleapis.com/auth/gmail.readonly" in scopes; assert "https://www.googleapis.com/auth/spreadsheets" in scopes' "${credentials_path}" "${token_path}"
          region=$(python -c 'import sys, yaml; data = yaml.safe_load(open(sys.argv[1])) or {}; searches = data.get("searches") or {}; assert searches; print(next(iter(searches)))' "${searches_path}")

          if ! career-agent scan-jobs \
            --dry-run \
            --linkedin-email-live \
            --email-hours-back 26 \
            --email-max-results 1 \
            --linkedin-search-live \
            --searches "${searches_path}" \
            --region "${region}" \
            --query-limit 1 \
            --max-results-per-query 1 \
            --watchlist-sheet-live \
            --sheet-id "${GOOGLE_SHEET_ID}" \
            --watchlist-limit 1 \
            --include-news \
            --news-rss-live \
            --news-impactalpha-email-live \
            --news-max-signals 5 \
            --top-signals 5 \
            --score \
            --score-provider gemini \
            --candidate-profile "${candidate_path}" \
            --draft-applications 1 \
            --max-jd-enrichment-attempts 2 \
            --application-provider gemini \
            --master-resume "${resume_path}" \
            --application-output preview \
            --credentials-path "${credentials_path}" \
            --token-path "${token_path}" >"${output_file}" 2>"${error_file}"; then
            unset GEMINI_API_KEY APIFY_API_TOKEN GOOGLE_SHEET_ID
            echo "::error::Integrated dry-run failed; private output and provider errors were withheld."
            exit 1
          fi
          unset GEMINI_API_KEY APIFY_API_TOKEN GOOGLE_SHEET_ID

          python -c 'import re, sys; lines = open(sys.argv[1]).read().splitlines(); allowed = {"", "Job scan summary", "Capital signal details hidden. Use --show-details to print titles.", "Details hidden. Use --show-details to print company/title/location rows.", "Application packet details hidden. Use --show-details to print packet rows."}; invalid = [line for line in lines if line not in allowed and not re.fullmatch(r"[a-z][a-z0-9_]*: [0-9]+", line) and not re.fullmatch(r"Application packets: [0-9]+", line)]; assert not invalid' "${output_file}"

          required_counts=(
            linkedin_email
            linkedin_search
            watchlist_scanned
            news_source_pack_rss_feeds
            news_rss
            news_impactalpha_email
            application_packets_requested
            application_packets_selected
            deduped_total
            dry_run
          )
          for name in "${required_counts[@]}"; do
            value=$(awk -F': ' -v key="${name}" '$1 == key {print $2}' "${output_file}")
            if [[ ! "${value}" =~ ^[0-9]+$ ]]; then
              echo "::error::Integrated dry-run summary is missing count $name."
              exit 1
            fi
          done

          [[ "$(awk -F': ' '$1 == "watchlist_scanned" {print $2}' "${output_file}")" == "1" ]]
          [[ "$(awk -F': ' '$1 == "application_packets_requested" {print $2}' "${output_file}")" == "1" ]]
          [[ "$(awk -F': ' '$1 == "dry_run" {print $2}' "${output_file}")" == "1" ]]
          ! grep -Fq "Email sent:" "${output_file}"

          cat "${output_file}"

      - name: Confirm the integrated dry-run left no private or generated files
        run: |
          test ! -e "${RUNNER_TEMP}/integrated-dry-run"
          test ! -e private
          test ! -e application_packets
          test -z "$(git status --porcelain --untracked-files=all)"
