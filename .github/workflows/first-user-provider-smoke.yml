name: first-user-provider-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: first-user-provider-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gemini-signal-smoke:
    if: github.ref == 'refs/heads/main'
    environment:
      name: first-user-provider-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out the public repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Gemini runtime dependencies
        run: python -m pip install -e ".[gemini]"

      - name: Confirm unrelated private settings are unavailable
        run: |
          forbidden_names=(
            OPENAI_API_KEY
            APIFY_API_TOKEN
            GOOGLE_CREDENTIALS_JSON
            GOOGLE_TOKEN_JSON
            GOOGLE_SHEET_ID
            GOOGLE_APPLICATION_TRACKER_SHEET_ID
            GMAIL_RECIPIENT
            PRIVATE_CANDIDATE_PROFILE_YAML
            PRIVATE_MASTER_RESUME_YAML
            PRIVATE_LINKEDIN_SEARCHES_YAML
          )

          for name in "${forbidden_names[@]}"; do
            if [[ -n "${!name-}" ]]; then
              echo "::error::Unrelated private setting $name must not be available."
              exit 1
            fi
          done

          test ! -e private

      - name: Score one public signal with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
        run: |
          output_file="${RUNNER_TEMP}/provider-smoke.txt"
          error_file="${RUNNER_TEMP}/provider-smoke-error.txt"

          if [[ -z "${GEMINI_API_KEY:-}" ]]; then
            echo "::error::GEMINI_API_KEY is not configured in first-user-provider-smoke."
            exit 1
          fi

          if ! career-agent scan-news \
            --rss-live \
            --score \
            --score-provider gemini \
            --max-signals 1 \
            --top-signals 1 >"${output_file}" 2>"${error_file}"; then
            echo "::error::Gemini provider smoke failed; raw provider output was withheld."
            exit 1
          fi

          unset GEMINI_API_KEY
          cat "${output_file}"

          selected_signals=$(awk -F': ' '$1 == "signals_selected" {print $2}' "${output_file}")
          top_signals=$(awk -F': ' '$1 == "top_signals" {print $2}' "${output_file}")
          provider_calls=$(awk -F': ' '$1 == "signal_scoring_provider_gemini" {print $2}' "${output_file}")

          [[ "${selected_signals}" == "1" ]]
          [[ "${top_signals}" == "1" ]]
          [[ "${provider_calls}" == "1" ]]

      - name: Confirm provider smoke left no private or generated files
        run: |
          test ! -e private
          test ! -e application_packets
          test -z "$(git status --porcelain --untracked-files=all)"
