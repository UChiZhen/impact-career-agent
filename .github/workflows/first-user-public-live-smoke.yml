name: first-user-public-live-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: first-user-public-live-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  public-rss-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out the public repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install -e .

      - name: Confirm private settings are unavailable
        run: |
          private_names=(
            GEMINI_API_KEY
            OPENAI_API_KEY
            APIFY_API_TOKEN
            GOOGLE_CREDENTIALS_JSON
            GOOGLE_TOKEN_JSON
            GOOGLE_SHEET_ID
            GOOGLE_APPLICATION_TRACKER_SHEET_ID
            GMAIL_RECIPIENT
            PRIVATE_CANDIDATE_PROFILE_YAML
            PRIVATE_MASTER_RESUME_YAML
            PRIVATE_LINKEDIN_SEARCHES_YAML
          )

          for name in "${private_names[@]}"; do
            if [[ -n "${!name-}" ]]; then
              echo "::error::Private setting $name must not be available to this workflow."
              exit 1
            fi
          done

          test ! -e private

      - name: Fetch and score the default public RSS pack
        run: |
          output_file="${RUNNER_TEMP}/public-rss-smoke.txt"
          fetch_succeeded=false

          for attempt in 1 2; do
            if career-agent scan-news \
              --rss-live \
              --score \
              --score-provider mock \
              --max-signals 5 \
              --top-signals 5 >"${output_file}"; then
              fetch_succeeded=true
              break
            fi

            if [[ "${attempt}" -lt 2 ]]; then
              echo "Public RSS attempt ${attempt} failed. Retrying once after 5 seconds."
              sleep 5
            fi
          done

          if [[ "${fetch_succeeded}" != "true" ]]; then
            echo "::error::The default public RSS pack failed after two attempts."
            exit 1
          fi

          cat "${output_file}"

          configured_feeds=$(awk -F': ' '$1 == "source_pack_rss_feeds" {print $2}' "${output_file}")
          fetched_signals=$(awk -F': ' '$1 == "rss_news" {print $2}' "${output_file}")
          selected_signals=$(awk -F': ' '$1 == "signals_selected" {print $2}' "${output_file}")

          [[ "${configured_feeds}" == "2" ]]
          [[ "${fetched_signals}" =~ ^[0-9]+$ && "${fetched_signals}" -gt 0 ]]
          [[ "${selected_signals}" =~ ^[0-9]+$ && "${selected_signals}" -gt 0 ]]
          [[ "${selected_signals}" -le 5 ]]

      - name: Confirm live smoke left no private or generated files
        run: |
          test ! -e private
          test ! -e application_packets
          test -z "$(git status --porcelain --untracked-files=all)"
